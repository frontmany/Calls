name: Docker Build And Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: callifornia-server
            dockerfile: calliforniaServer.Dockerfile
          - image: callifornia-server-updater
            dockerfile: calliforniaServerUpdater.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "docker-compose.yml"
          target: "/home/lpvoid/callifornia"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            set -e

            DEPLOY_ROOT=/home/lpvoid/callifornia
            mkdir -p "$DEPLOY_ROOT"
            cd "$DEPLOY_ROOT"

            mkdir -p volumes/calliforniaServer/logs
            mkdir -p volumes/calliforniaServerUpdater/logs
            mkdir -p volumes/calliforniaServerUpdater/versions

            cat > .env <<EOF
            COMPOSE_PROJECT_NAME=callifornia
            DOCKERHUB_NAMESPACE=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ github.ref_name }}
            EOF

            COMPOSE="docker-compose -p callifornia -f docker-compose.yml"

            # Legacy path: free ports if a previous deploy used /opt/callifornia
            if [ -f /opt/callifornia/docker-compose.yml ]; then
              (cd /opt/callifornia && docker-compose -p callifornia -f docker-compose.yml down --remove-orphans) 2>/dev/null || true
            fi
            $COMPOSE down --remove-orphans 2>/dev/null || true

            # Free host TCP/UDP 8081 and 8082 (wrong grep before: docker port uses "8081/tcp -> 0.0.0.0:8081", not ":8081->")
            for port in 8081 8082; do
              for id in $(docker ps -q --filter "publish=$port" 2>/dev/null); do
                [ -n "$id" ] && docker stop "$id" 2>/dev/null || true
              done
            done
            for id in $(docker ps -q); do
              docker port "$id" 2>/dev/null | grep -qE '^8081/|^8082/' && docker stop "$id" 2>/dev/null || true
            done
            _busy=$(docker ps --format '{{.ID}} {{.Ports}}' | { grep -E '8081->|8082->' || true; } | awk '{print $1}' | sort -u)
            if [ -n "$_busy" ]; then docker stop $_busy 2>/dev/null || true; fi

            $COMPOSE pull
            $COMPOSE up -d --no-build --remove-orphans
            $COMPOSE ps
            docker image prune -f
