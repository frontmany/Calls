name: Docker Build And Deploy

on:
  push:
    tags:
      - 'v*'

env:
  REGISTRY: docker.io
  NAMESPACE: ${{ secrets.DOCKER_USERNAME }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: callifornia-server
            dockerfile: calliforniaServer.Dockerfile
          - image: callifornia-server-updater
            dockerfile: calliforniaServerUpdater.Dockerfile

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.NAMESPACE }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.ref_name }},enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy docker-compose.yml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          source: "docker-compose.yml"
          target: "/home/lpvoid/callifornia"

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_PORT }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          script: |
            set -e

            DEPLOY_ROOT=/home/lpvoid/callifornia
            mkdir -p "$DEPLOY_ROOT"
            cd "$DEPLOY_ROOT"

            mkdir -p volumes/calliforniaServer/logs
            mkdir -p volumes/calliforniaServerUpdater/logs
            mkdir -p volumes/calliforniaServerUpdater/versions

            cat > .env <<EOF
            COMPOSE_PROJECT_NAME=callifornia
            DOCKERHUB_NAMESPACE=${{ secrets.DOCKER_USERNAME }}
            IMAGE_TAG=${{ github.ref_name }}
            EOF

            COMPOSE="docker-compose -p callifornia -f $DEPLOY_ROOT/docker-compose.yml"

            # Legacy path: free ports if a previous deploy used /opt/callifornia
            if [ -f /opt/callifornia/docker-compose.yml ]; then
              (cd /opt/callifornia && docker-compose -p callifornia -f docker-compose.yml kill 2>/dev/null || true)
              (cd /opt/callifornia && docker-compose -p callifornia -f docker-compose.yml down --remove-orphans) 2>/dev/null || true
            fi
            $COMPOSE kill 2>/dev/null || true
            $COMPOSE down --remove-orphans 2>/dev/null || true
            $COMPOSE rm -f -s 2>/dev/null || true

            # By compose label (when present)
            docker ps -aq --filter "label=com.docker.compose.project=callifornia" | while read -r id; do
              [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
            done

            # By container name substring (does not rely on labels; matches callifornia_*)
            docker ps -aq --filter "name=callifornia" | while read -r id; do
              [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
            done

            # HostPort from inspect (bridge + published ports)
            for id in $(docker ps -q); do
              _hp=$(docker inspect -f '{{range $p, $conf := .NetworkSettings.Ports}}{{range $conf}}{{.HostPort}} {{end}}{{end}}' "$id" 2>/dev/null)
              for port in 8081 8082; do
                if echo "$_hp" | grep -wq "$port" 2>/dev/null; then
                  docker rm -f "$id" 2>/dev/null || true
                  break
                fi
              done
            done

            for port in 8081 8082; do
              for id in $(docker ps -q --filter "publish=$port" 2>/dev/null); do
                [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
              done
            done
            for id in $(docker ps -q); do
              docker port "$id" 2>/dev/null | grep -qE '^8081/|^8082/' && docker rm -f "$id" 2>/dev/null || true
            done
            docker ps --format '{{.ID}} {{.Ports}}' | { grep -E '8081->|8082->' || true; } | awk '{print $1}' | while read -r id; do
              [ -n "$id" ] && docker rm -f "$id" 2>/dev/null || true
            done

            # If ports still held by docker-proxy (stale state), kill only docker-proxy PIDs on 8081/8082
            if command -v ss >/dev/null 2>&1; then
              for port in 8081 8082; do
                ss -ltnp 2>/dev/null | grep ":$port" | while read -r line; do
                  pid=$(echo "$line" | sed -n 's/.*pid=\([0-9][0-9]*\).*/\1/p' | head -1)
                  [ -n "$pid" ] || continue
                  comm=$(ps -p "$pid" -o comm= 2>/dev/null | tr -d ' ')
                  case "$comm" in
                    docker-proxy*) kill -9 "$pid" 2>/dev/null || true ;;
                  esac
                done
              done
            fi

            $COMPOSE pull
            $COMPOSE up -d --no-build --remove-orphans
            $COMPOSE ps
            docker image prune -f
